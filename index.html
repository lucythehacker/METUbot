<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METUbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .odtu-red { background-color: #D32F2F; }
        .odtu-text-red { color: #D32F2F; }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">

                 <header class="odtu-red text-white p-2 shadow-lg flex items-center justify-between min-h-[120px]">
        <div class="flex items-center gap-2">
            <div class="w-32 h-32 flex items-center justify-center">
                <img src="odtu-amblem.png" alt="METU Logo" class="w-full h-full object-contain transform scale-110">
            </div>
            
            <div class="flex flex-col">
                <div class="flex items-baseline">
                    <span class="text-4xl font-medium tracking-tight">METU</span>
                    <span class="text-3xl font-light tracking-[0.2em] ml-3 opacity-80 uppercase">bot</span>
                </div>
                <span class="text-[10px] opacity-50 uppercase tracking-[0.4em] mt-1 ml-1">AI Campus Assistant</span>
            </div>
        </div>
        
        <div class="hidden md:block mr-6 text-sm opacity-70 font-light bg-white/5 px-5 py-2 rounded-full border border-white/10">
            METU Project
        </div>
    </header>






    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 chat-container">
        <div class="flex justify-start">
            <div class="bg-white border-l-4 border-[#D32F2F] text-gray-800 p-4 rounded-lg rounded-tl-none max-w-[85%] shadow-sm">
                <p class="font-semibold odtu-text-red mb-1">Merhaba!</p>
                <p class="text-sm text-gray-600">METUbot'a hoş geldin. Sana kampüs hayatı ve okul yönetmelikleri hakkında nasıl yardımcı olabilirim?</p>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-white border-t">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="Mesajınızı yazın..." class="flex-1 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#D32F2F] transition-all">
            <button onclick="sendMessage()" class="odtu-red text-white px-6 py-3 rounded-xl font-bold hover:bg-red-700 active:scale-95 transition-all shadow-md">
                Gönder
            </button>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        function sendMessage() {
            const text = userInput.value.trim();
            if (text === "") return;
            addMessage(text, 'user');
            userInput.value = "";
            setTimeout(() => {
                addMessage("Bu konuyu hemen araştırıyorum...", 'ai');
            }, 1000);
        }

        function addMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = sender === 'user' ? 'flex justify-end' : 'flex justify-start';
            const msgDiv = document.createElement('div');
            msgDiv.className = sender === 'user' 
                ? 'bg-gray-700 text-white p-3 rounded-2xl rounded-tr-none max-w-[80%] shadow-md' 
                : 'bg-white border-l-4 border-[#D32F2F] text-gray-800 p-3 rounded-2xl rounded-tl-none max-w-[80%] shadow-sm';
            msgDiv.innerText = text;
            wrapper.appendChild(msgDiv);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
